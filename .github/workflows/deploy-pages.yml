name: Deploy to gh-pages

# Veröffentlicht die statische App bei jedem Push nach main in den
# separaten Branch `gh-pages` (force-orphan: enthält nur den aktuellen Stand).
on:
  push:
    branches: [main]
  workflow_dispatch: # erlaubt manuelles Auslösen im Actions-Tab

permissions:
  contents: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build publish directory
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir _site
          # Statische Assets der App veröffentlichen (Desktop + Mobil + gemeinsamer Core)
          cp index.html styles.css app.js core.js mobile.html mobile.css mobile.js _site/
          # Cache-Busting: Platzhalter __BUILD__ durch kurze Commit-SHA ersetzen
          ver="${GITHUB_SHA:0:7}"
          sed -i "s/__BUILD__/${ver}/g" _site/index.html _site/mobile.html
          # GitHub Pages soll die Dateien nicht durch Jekyll verarbeiten
          touch _site/.nojekyll
          # Custom-Domain erhalten (sonst wird sie beim Force-Push gelöscht -> 404)
          [ -f CNAME ] && cp CNAME _site/CNAME || true

      - name: Publish to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd _site
          git init -q
          git checkout -q -b gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA:0:7} from ${GITHUB_REF_NAME}"
          # Force-Push: gh-pages spiegelt immer exakt den aktuellen main-Stand
          git push -f \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            gh-pages
