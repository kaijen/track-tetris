<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track-Tetris – Konferenz-Zeitplaner</title>
  <link rel="stylesheet" href="styles.css?v=__BUILD__" />
  <script>
    // Mobilgeräte direkt auf die Mobil-Version leiten (außer der Nutzer
    // wählt bewusst Desktop: ?desktop oder zuvor gesetztes Flag).
    (function () {
      try {
        var params = new URLSearchParams(location.search);
        if (params.has('desktop')) sessionStorage.setItem('tt-force-desktop', '1');
        var forced = sessionStorage.getItem('tt-force-desktop');
        var isMobile = window.matchMedia('(max-width: 700px)').matches ||
          /Mobi|Android|iPhone|iPod/i.test(navigator.userAgent);
        if (isMobile && !forced) location.replace('mobile.html');
      } catch (_) { /* im Zweifel Desktop anzeigen */ }
    })();
  </script>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <h1>🧩 Track-Tetris</h1>
      <input type="text" id="confTitle" class="conf-title" placeholder="Konferenztitel …" maxlength="120" />
    </div>
    <div class="header-controls">
      <label class="start-time">
        Startzeit
        <input type="time" id="startTime" value="09:00" />
      </label>
      <div class="header-buttons">
        <button id="exportBtn" class="btn btn-secondary" title="Als JSON exportieren">⬇ Export</button>
        <button id="importBtn" class="btn btn-secondary" title="JSON laden">⬆ Import</button>
        <input type="file" id="importFile" accept="application/json,.json" hidden />
        <button id="resetBtn" class="btn btn-ghost" title="Alles zurücksetzen">Zurücksetzen</button>
        <a href="mobile.html" class="btn btn-ghost" title="Touch-optimierte Mobil-Version">📱 Mobil</a>
      </div>
    </div>
  </header>

  <main class="layout">
    <!-- Template-Palette -->
    <aside class="palette panel">
      <div class="panel-head">
        <h2>Templates</h2>
        <span class="hint">Ziehe Blöcke in Tracks</span>
      </div>

      <form id="templateForm" class="template-form">
        <input type="text" id="tplName" placeholder="Name (z.B. Keynote)" required />
        <div class="row">
          <input type="number" id="tplDuration" placeholder="Min." min="1" value="30" required />
          <input type="color" id="tplColor" value="#4f8cff" title="Farbe" />
          <button type="submit" class="btn btn-primary">+ Neu</button>
        </div>
        <label class="tpl-blocking" title="Erzeugt beim Platzieren ein Plenum über alle Tracks">
          <input type="checkbox" id="tplBlocking" /> 🔒 Blocking (über alle Tracks)
        </label>
      </form>

      <ul id="templateList" class="template-list"></ul>
    </aside>

    <!-- Track-Board -->
    <section class="board panel">
      <div class="panel-head">
        <h2>Tracks</h2>
        <div class="board-tools">
          <div class="zoom" title="Zeitachse zoomen">
            <button id="zoomOut" class="btn btn-icon" type="button">−</button>
            <span id="zoomLabel" class="zoom-label"></span>
            <button id="zoomIn" class="btn btn-icon" type="button">+</button>
          </div>
          <button id="addPlenumBtn" class="btn btn-secondary" title="Plenum-Block über alle Tracks (z.B. Keynote, Closing)">🔒 + Plenum</button>
          <button id="addTrackBtn" class="btn btn-primary">+ Track</button>
        </div>
      </div>
      <div id="trackBoard" class="track-board"></div>
    </section>
  </main>

  <!-- Edit-Dialog (Blöcke, Lücken, Templates) -->
  <div id="modal" class="modal-overlay" hidden>
    <form id="modalForm" class="modal">
      <h3 id="modalTitle"></h3>
      <div id="modalFields" class="modal-fields"></div>
      <div class="modal-actions">
        <button type="button" id="modalCancel" class="btn btn-ghost">Abbrechen</button>
        <button type="submit" id="modalSave" class="btn btn-primary">Speichern</button>
      </div>
    </form>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="core.js?v=__BUILD__"></script>
  <script src="app.js?v=__BUILD__"></script>
</body>
</html>
